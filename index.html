<!DOCTYPE html>
<html lang="es">
<head>

    <style>
        :root{--bg:#060a13;--card:rgba(10,18,32,.88);--border:rgba(0,229,255,.1);--accent:#00e5ff;--glow:rgba(0,229,255,.25);--warm:#ff6b35;--text:#e2e8f0;--muted:#4a5e78;--danger:#ef4444;--green:#22c55e}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{height:100%;overflow:hidden}
        body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text)}
        body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(0,229,255,.025) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;z-index:0}
        .fo{font-family:'Orbitron',monospace}
        .launcher{display:flex;flex-direction:column;height:100vh;width:100vw;padding:4px;gap:4px;position:relative;z-index:1}
        .main-area{flex:1;display:grid;gap:4px;min-height:0}
        @media(orientation:landscape){.main-area{grid-template-columns:1.5fr 1.3fr 1.1fr;grid-template-rows:1.2fr 1fr}.z-map{grid-column:1/3;grid-row:1}.z-info{grid-column:3;grid-row:1}.z-mus{grid-column:1/3;grid-row:2}.z-spd{grid-column:3;grid-row:2}}
        @media(orientation:portrait){.main-area{grid-template-columns:1fr;grid-template-rows:1fr .85fr .8fr}.z-map{grid-column:1;grid-row:1}.z-info{display:none!important}.z-mus{grid-column:1;grid-row:2}.z-spd{grid-column:1;grid-row:3}}
        .z-bar{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:4px;padding:3px 4px}
        .card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;position:relative;backdrop-filter:blur(16px)}
        #map{width:100%;height:100%;z-index:1}
        .map-s{position:absolute;top:6px;left:6px;right:48px;z-index:1000;display:flex;gap:4px}
        .map-s input{flex:1;background:rgba(6,10,19,.93);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:14px;outline:none}
        .map-s input:focus{border-color:var(--accent);box-shadow:0 0 14px var(--glow)}
        .map-s input::placeholder{color:var(--muted)}
        .map-s button{background:var(--accent);color:#000;border:none;padding:0 14px;border-radius:8px;font-size:15px;cursor:pointer}
        .map-s button:active{transform:scale(.93)}
        .map-loc{position:absolute;top:6px;right:6px;z-index:1000;width:36px;height:36px;border-radius:8px;background:rgba(6,10,19,.93);border:1px solid var(--border);color:var(--accent);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}

        .pli.on{color:var(--accent);background:var(--glow)}
        .sbn{background:linear-gradient(135deg,var(--accent),#0091a7);color:#000;border:none;padding:10px 24px;border-radius:8px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;cursor:pointer}
        .sbn:active{transform:scale(.95)}

        .vs::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer}
        .ab{background:var(--card);border:1px solid var(--border);color:var(--muted);width:56px;height:42px;border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:16px;transition:all .15s;flex-shrink:0}

        .ab:active{border-color:var(--accent);color:var(--accent);box-shadow:0 0 12px var(--glow);transform:scale(.92)}

        .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
        .leaflet-control-zoom,.leaflet-control-attribution{display:none!important}

        /* Overlay de escaneo */
        .scan-overlay{position:fixed;inset:0;background:rgba(6,10,19,.92);z-index:10000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;backdrop-filter:blur(10px)}

        .scan-ico{width:60px;height:60px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .scan-prog{width:240px;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
        .scan-prog-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width .3s}

        /* CachÃĐ info */
        .cache-tag{font-size:10px;color:var(--green);display:inline-flex;align-items:center;gap:3px}

        .gps-on{animation:gpsP 2s ease-out infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
        .gps-wait{animation:blink 1.5s ease-in-out infinite}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>

<script>
/* ============================================================
   BASE DE DATOS INDEXEDDB - Persistencia de mÃšsica
   ============================================================ */
const DB_NAME='DriveLaunchMusic',DB_VER=1,ST_NAME='tracks';

function openDB(){
    return new Promise((res,rej)=>{
        const r=indexedDB.open(DB_NAME,DB_VER);
        r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(ST_NAME))db.createObjectStore(ST_NAME,{keyPath:'id'})};
        r.onsuccess=e=>res(e.target.result);
        r.onerror=e=>rej(e.target.error);
    });
}

/* Guardar una canciÃģn como Blob en IndexedDB */
async function saveTrack(id,name,blob,type){
    const db=await openDB();
    return new Promise((res,rej)=>{
        const tx=db.transaction(ST_NAME,'readwrite');
        tx.objectStore(ST_NAME).put({id,name,blob,type});
        tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);
    });
}

/* Cargar todas las canciones de IndexedDB */
async function loadAllTracks(){
    const db=await openDB();
    return new Promise((res,rej)=>{
        const tx=db.transaction(ST_NAME,'readonly');
        const r=tx.objectStore(ST_NAME).getAll();
        r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e.target.error);
    });
}

/* Borrar una canciÃģn */
async function deleteTrack(id){
    const db=await openDB();
    return new Promise((res,rej)=>{
        const tx=db.transaction(ST_NAME,'readwrite');
        tx.objectStore(ST_NAME).delete(id);
        tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);
    });
}

/* Borrar toda la cachÃĐ */
async function clearAllTracks(){
    const db=await openDB();
    return new Promise((res,rej)=>{
        const tx=db.transaction(ST_NAME,'readwrite');
        tx.objectStore(ST_NAME).clear();
        tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);
    });
}

/* ============================================================
   ESCANEO DE CARPETAS - File System Access API
   ============================================================ */

/* Escaneo recursivo de directorios con showDirectoryPicker */
async function scanDirRecursive(dirHandle){
    const files=[];
    for await(const entry of dirHandle.values()){
        if(entry.kind==='file'){
            try{
                const file=await entry.getFile();
                if(file.type.startsWith('audio/')||/\.(mp3|wav|ogg|flac|aac|m4a|wma|opus|webm)$/i.test(file.name)){
                    files.push(file);
                }
            }catch(e){/* archivo inaccesible, saltar */}
        }else if(entry.kind==='directory'){
            try{const sub=await scanDirRecursive(entry);files.push(...sub)}catch(e){/* carpeta inaccesible, saltar */}
        }
    }
    return files;
}

/* Procesar archivos encontrados: guardar en IndexedDB y en playlist */
async function processFiles(files,progCb){
    let count=0;
    const existing=new Set(pl.map(t=>t.id));
    for(const file of files){
        /* Generar ID Ãšnico basado en nombre + tamaÃąo */
        const id=file.name+'__'+file.size;
        if(existing.has(id)){count++;if(progCb)progCb(count,files.length,file.name);continue}
        try{
            /* Leer el archivo como ArrayBuffer y guardarlo */
            const buf=await file.arrayBuffer();
            const blob=new Blob([buf],{type:file.type||'audio/mpeg'});
            const name=file.name.replace(/\.[^/.]+$/,'');
            await saveTrack(id,name,blob,file.type||'audio/mpeg');
            const url=URL.createObjectURL(blob);
            pl.push({id,name,url,blob});
            existing.add(id);
        }catch(e){console.warn('Error guardando:',file.name,e)}
        count++;
        if(progCb)progCb(count,files.length,file.name);
    }
}

/* FunciÃģn principal de escaneo */
async function doScan(){
    const ov=document.getElementById('scanOv');
    const txt=document.getElementById('scanTxt');
    const prog=document.getElementById('scanProg');
    const cnt=document.getElementById('scanCount');
    ov.classList.add('on');
    txt.textContent='Selecciona tu carpeta de mÃšsica...';
    prog.style.width='0%';cnt.textContent='0 archivos encontrados';

    let files=[];

    /* MÃĐtodo 1: File System Access API (mejor, recursivo) */
    if(window.showDirectoryPicker){
        try{
            txt.textContent='Selecciona tu carpeta de mÃšsica...';
            const dirHandle=await window.showDirectoryPicker({mode:'read'});
            txt.textContent='Escaneando carpetas...';
            files=await scanDirRecursive(dirHandle);
            cnt.textContent=files.length+' archivos de audio encontrados';
        }catch(e){
            if(e.name!=='AbortError')console.warn('showDirectoryPicker fallÃģ:',e);
            ov.classList.remove('on');
            return;
        }
    }

    /* MÃĐtodo 2: webkitdirectory fallback */
    if(!files.length){
        try{
            ov.classList.remove('on');
            const dirInput=document.getElementById('fDir');
            const dirFiles=await new Promise((res,rej)=>{
                dirInput.onchange=e=>res(Array.from(e.target.files));
                dirInput.onclick=rej;
                dirInput.click();
                /* Timeout por si no selecciona nada */
                setTimeout(()=>rej('timeout'),120000);
            });
            files=dirFiles.filter(f=>f.type.startsWith('audio/')||/\.(mp3|wav|ogg|flac|aac|m4a|wma|opus|webm)$/i.test(f.name));
            ov.classList.add('on');
            txt.textContent='Procesando archivos...';
            cnt.textContent=files.length+' archivos de audio encontrados';
        }catch(e){
            if(e==='timeout'||e.name==='AbortError'){ov.classList.remove('on');return}
            console.warn('webkitdirectory fallÃģ:',e);
        }
    }

    if(!files.length){ov.classList.remove('on');toast('No se encontraron archivos de audio');return}

    /* Guardar en IndexedDB */
    txt.textContent='Guardando en memoria...';
    await processFiles(files,(done,total,name)=>{
        const pct=Math.round(done/total*100);

    const nA=SA+f*SW,nL=R-w*.17;sX.save();sX.translate(cx,cy);sX.rotate(nA);sX.shadowColor='#00e5ff';sX.shadowBlur=14;sX.beginPath();sX.moveTo(0,-2.5);sX.lineTo(nL,0);sX.lineTo(0,2.5);sX.closePath();sX.fillStyle='#00e5ff';sX.fill();sX.restore();

}

async function traceRoute(fLa,fLo,tLa,tLo){
    clearRoute();
    const srvs=[{n:'OSRM DE',u:`https://routing.openstreetmap.de/routed-car/route/v1/driving/${fLo},${fLa};${tLo},${tLa}`},{n:'OSRM Demo',u:`https://router.project-osrm.org/route/v1/driving/${fLo},${fLa};${tLo},${tLa}`},{n:'OSRM Bike',u:`https://routing.openstreetmap.de/routed-bike/route/v1/driving/${fLo},${fLa};${tLo},${tLa}`}];
    for(const s of srvs){try{const r=await fetch(s.u+'?overview=full&geometries=geojson&steps=true&alternatives=0',{signal:AbortSignal.timeout(8000)});const d=await r.json();if(d.code==='Ok'&&d.routes&&d.routes.length>0){applyRoute(d.routes[0]);toast('Ruta via '+s.n);return}}catch(e){console.warn(s.n+' fallÃģ')}}
    const sc=[[fLa,fLo],[tLa,tLo]];const sh=L.polyline(sc,{color:'rgba(255,107,53,.12)',weight:10,lineCap:'round',dashArray:'10 10'}).addTo(map);const ln=L.polyline(sc,{color:'#ff6b35',weight:3,lineCap:'round',dashArray:'8 8'}).addTo(map);rLayers.push(sh,ln);routeCoords=sc;routeSteps=[];routeTotalDist=hav(fLa,fLo,tLa,tLo);routeTotalDur=(routeTotalDist/1000)/35*3600;
    document.getElementById('nbDs').textContent=fmtD(routeTotalDist);document.getElementById('nbTt').textContent=fmtD(routeTotalDist);document.getElementById('nbEt').textContent='Llegada: ~'+fmtDr(routeTotalDur);document.getElementById('nbD').textContent='Ruta directa';document.getElementById('nbI').innerHTML='<i class="fas fa-arrow-up"></i>';document.getElementById('nbI').className='nb-i w';document.getElementById('navB').classList.add('on');navActive=true;nearestIdx=0;offRC=0;map.fitBounds(ln.getBounds(),{padding:[40,40]});toast('Ruta directa (servidores no disponibles)');
}
function applyRoute(rt){
    routeCoords=rt.geometry.coordinates.map(c=>[c[1],c[0]]);routeTotalDist=rt.distance;routeTotalDur=rt.duration;routeSteps=[];
    if(rt.legs&&rt.legs[0]&&rt.legs[0].steps){rt.legs[0].steps.forEach(s=>{if(s.maneuver&&s.maneuver.type!=='depart'&&s.maneuver.type!=='arrive'){routeSteps.push({type:s.maneuver.type,modifier:s.maneuver.modifier||'',location:[s.maneuver.location[1],s.maneuver.location[0]],name:s.name||'',distance:s.distance,duration:s.duration})}})}
    const sh=L.polyline(routeCoords,{color:'rgba(0,229,255,.12)',weight:10,lineCap:'round',lineJoin:'round'}).addTo(map);const ln=L.polyline(routeCoords,{color:'#00e5ff',weight:4,lineCap:'round',lineJoin:'round'}).addTo(map);rLayers.push(sh,ln);
    passedLayer=L.polyline([],{color:'#22c55e',weight:5,lineCap:'round',lineJoin:'round',opacity:.8}).addTo(map);
    document.getElementById('nbTt').textContent=fmtD(routeTotalDist);document.getElementById('navB').classList.add('on');navActive=true;nearestIdx=0;offRC=0;foll=true;updateBanner();map.fitBounds(ln.getBounds(),{padding:[40,40]});
}

/* ============================================================
   NAVEGACIÃN ACTIVA
   ============================================================ */
function checkPos(){
    if(!navActive||!routeCoords.length||recalc)return;
    let minD=Infinity,minI=nearestIdx;const s0=Math.max(0,nearestIdx-2);
    for(let i=s0;i<routeCoords.length;i++){const d=hav(uLat,uLon,routeCoords[i][0],routeCoords[i][1]);if(d<minD){minD=d;minI=i}}
    if(minD>OFF_TH){offRC++;if(offRC>=OFF_LIM){toast('Recalculando ruta...');recalcRoute();return}}else{offRC=0}
    if(minI>=nearestIdx)nearestIdx=minI;
    if(passedLayer&&nearestIdx>0)passedLayer.setLatLngs(routeCoords.slice(0,nearestIdx+1));
    map.setView([uLat,uLon],16,{animate:true,duration:.4});
    let rem=0;for(let i=nearestIdx;i<routeCoords.length-1;i++)rem+=hav(routeCoords[i][0],routeCoords[i][1],routeCoords[i+1][0],routeCoords[i+1][1]);
    rem+=hav(uLat,uLon,routeCoords[nearestIdx][0],routeCoords[nearestIdx][1]);
    const spd=gSpd>5?gSpd:30;const rT=(rem/1000)/(spd)*3600;const eta=new Date(Date.now()+rT*1000);
    document.getElementById('nbDs').textContent=fmtD(rem);document.getElementById('nbEt').textContent='Llegada: '+eta.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',hour12:false});
    if(destLat!==null&&hav(uLat,uLon,destLat,destLon)<30){toast('Has llegado a tu destino');stopNav();return}
    updateTurn(rem);
}
function updateTurn(rem){
    const iE=document.getElementById('nbI'),dE=document.getElementById('nbD'),sE=document.getElementById('nbS');let ns=null,dt=0;
    for(let i=nearestIdx;i<routeCoords.length-1;i++){dt+=hav(routeCoords[i][0],routeCoords[i][1],routeCoords[i+1][0],routeCoords[i+1][1]);for(const st of routeSteps){if(Math.abs(st.location[0]-routeCoords[i+1][0])<.0002&&Math.abs(st.location[1]-routeCoords[i+1][1])<.0002){ns=st;break}}if(ns)break}
    if(!ns){iE.innerHTML='<i class="fas fa-flag-checkered"></i>';iE.className='nb-i g';dE.textContent='Sigue recto al destino';sE.textContent='';return}
    const md=ns.modifier.toLowerCase(),ty=ns.type.toLowerCase();let ic='',tx='',cl='';
    if(ty==='roundabout'||ty==='rotary'){ic='fa-rotate-right';tx='Entra a la rotonda';cl='w'}
    else if(ty==='on ramp'||ty==='off ramp'){ic=md.includes('left')?'fa-arrow-left':'fa-arrow-right';tx='Toma el desvÃ­o';cl='w'}
    else if(md.includes('left')){ic='fa-arrow-left';tx='Gira a la izquierda';cl=''}
    else if(md.includes('right')){ic='fa-arrow-right';tx='Gira a la derecha';cl=''}
    else{ic='fa-arrow-up';tx='Sigue recto';cl=''}
    if(dt<APP_D){tx='Gira ahora';cl='w'}
    iE.innerHTML='<i class="fas '+ic+'"></i>';iE.className='nb-i'+(cl?' '+cl:'');dE.textContent=tx;sE.textContent=ns.name||'';
}
function updateBanner(){document.getElementById('nbDs').textContent=fmtD(routeTotalDist);const eta=new Date(Date.now()+routeTotalDur*1000);document.getElementById('nbEt').textContent='Llegada: '+eta.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',hour12:false});if(!routeSteps.length){document.getElementById('nbI').innerHTML='<i class="fas fa-arrow-up"></i>';document.getElementById('nbI').className='nb-i';document.getElementById('nbD').textContent='Sigue la ruta';document.getElementById('nbS').textContent=''}}
async function recalcRoute(){
    if(recalc||destLat===null)return;recalc=true;offRC=0;
    try{const r=await fetch(`https://routing.openstreetmap.de/routed-car/route/v1/driving/${uLon},${uLat};${destLon},${destLat}?overview=full&geometries=geojson&steps=true&alternatives=0`,{signal:AbortSignal.timeout(8000)});const d=await r.json();if(d.code==='Ok'&&d.routes&&d.routes.length>0){clrLayers();applyRoute(d.routes[0]);toast('Ruta recalculada');recalc=false;return}}catch(e){}
    try{const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${uLon},${uLat};${destLon},${destLat}?overview=full&geometries=geojson&steps=true&alternatives=0`,{signal:AbortSignal.timeout(8000)});const d=await r.json();if(d.code==='Ok'&&d.routes&&d.routes.length>0){clrLayers();applyRoute(d.routes[0]);toast('Ruta recalculada')}}catch(e){toast('No se pudo recalcular')}
    recalc=false;
}
function clrLayers(){rLayers.forEach(l=>map.removeLayer(l));rLayers=[];if(passedLayer){map.removeLayer(passedLayer);passedLayer=null}}
function clearRoute(){clrLayers();if(dMk){map.removeLayer(dMk);dMk=null}document.getElementById('navB').classList.remove('on');navActive=false;routeCoords=[];routeSteps=[];nearestIdx=0;offRC=0;destLat=null;destLon=null}

    await processFiles(files,(done,total,name)=>{
        document.getElementById('scanProg').style.width=Math.round(done/total*100)+'%';
        document.getElementById('scanCount').textContent=done+'/'+total+' â '+name;
    });
    ov.classList.remove('on');
    document.getElementById('scanV').classList.add('hidden');
    document.getElementById('playV').classList.remove('hidden');
    buildPL();updateCacheTag();
    toast(pl.length+' canciones listas');
    if(cTrk===-1)loadTrk(0);
    e.target.value='';
};

/* Input de directorio (fallback para navegadores sin showDirectoryPicker) */
document.getElementById('fDir').onchange=async e=>{
    const files=Array.from(e.target.files).filter(f=>f.type.startsWith('audio/')||/\.(mp3|wav|ogg|flac|aac|m4a|wma|opus|webm)$/i.test(f.name));
    const ov=document.getElementById('scanOv');ov.classList.add('on');
    document.getElementById('scanTxt').textContent='Procesando carpeta...';
    document.getElementById('scanCount').textContent=files.length+' archivos encontrados';
    await processFiles(files,(done,total,name)=>{
        document.getElementById('scanProg').style.width=Math.round(done/total*100)+'%';
        document.getElementById('scanCount').textContent=done+'/'+total+' â '+name;
    });
    ov.classList.remove('on');
    if(pl.length>0){
        document.getElementById('scanV').classList.add('hidden');
        document.getElementById('playV').classList.remove('hidden');
        buildPL();updateCacheTag();toast(pl.length+' canciones listas');if(cTrk===-1)loadTrk(0);
    }else toast('No se encontraron archivos de audio');
    e.target.value='';
};

/* BotÃģn limpiar cachÃĐ */
document.getElementById('clrCache').onclick=async()=>{
    if(!confirm('Borrar toda la mÃšsica guardada?'))return;
    pauseA();pl=[];cTrk=-1;aud.src='';
    try{await clearAllTracks()}catch(e){console.warn(e)}
    localStorage.removeItem('dl_lastTrack');
    document.getElementById('playV').classList.add('hidden');
    document.getElementById('scanV').classList.remove('hidden');
    toast('MÃšsica eliminada');
};

function buildPL(){const b=document.getElementById('plL');b.innerHTML='';pl.forEach((t,i)=>{const d=document.createElement('div');d.className='pli'+(i===cTrk?' on':'');d.textContent=(i+1)+'. '+t.name;d.onclick=()=>{loadTrk(i);playA()};b.appendChild(d)})}
function loadTrk(i){if(i<0||i>=pl.length)return;cTrk=i;aud.src=pl[i].url;document.getElementById('tNm').textContent=pl[i].name;document.getElementById('tNm').style.color='var(--text)';localStorage.setItem('dl_lastTrack',pl[i].id);buildPL()}
function playA(){aud.play().then(()=>{playing=true;document.getElementById('plI').className='fas fa-pause'}).catch(()=>toast('Error al reproducir'))}
function pauseA(){aud.pause();playing=false;document.getElementById('plI').className='fas fa-play'}
document.getElementById('plB').onclick=()=>{if(cTrk===-1)return;playing?pauseA():playA()};
document.getElementById('pvB').onclick=()=>{if(!pl.length)return;if(aud.currentTime>3){aud.currentTime=0;return}let i=cTrk-1;if(i<0)i=pl.length-1;loadTrk(i);playA()};
document.getElementById('nxB').onclick=nxtT;
function nxtT(){if(!pl.length)return;let i;if(shOn)i=Math.floor(Math.random()*pl.length);else{i=cTrk+1;if(i>=pl.length)i=0}loadTrk(i);playA()}
aud.onended=()=>{if(rpM===2){aud.currentTime=0;playA()}else if(rpM===1||cTrk<pl.length-1)nxtT();else pauseA()};
document.getElementById('shB').onclick=()=>{shOn=!shOn;const b=document.getElementById('shB');b.style.color=shOn?'var(--accent)':'var(--text)';b.style.borderColor=shOn?'var(--accent)':'var(--border)';toast(shOn?'Aleatorio on':'Aleatorio off')};
document.getElementById('rpB').onclick=()=>{rpM=(rpM+1)%3;const b=document.getElementById('rpB');if(rpM===0){b.style.color='var(--text)';b.style.borderColor='var(--border)';toast('Repetir off')}else if(rpM===1){b.style.color='var(--accent)';b.style.borderColor='var(--accent)';toast('Repetir todo')}else{b.style.color='var(--warm)';b.style.borderColor='var(--warm)';toast('Repetir una')}};
document.getElementById('volS').oninput=e=>{aud.volume=e.target.value/100};
aud.ontimeupdate=()=>{if(!aud.duration)return;document.getElementById('pFl').style.width=(aud.currentTime/aud.duration*100)+'%';document.getElementById('cuT').textContent=fmtT(aud.currentTime);document.getElementById('toT').textContent=fmtT(aud.duration)};
document.getElementById('pBar').onclick=e=>{if(!aud.duration)return;const r=e.target.getBoundingClientRect();aud.currentTime=((e.clientX-r.left)/r.width)*aud.duration};
document.getElementById('togPL').onclick=()=>document.getElementById('plL').classList.toggle('hidden');

/* ============================================================
   BARRA DE ACCIONES
   ============================================================ */
document.getElementById('aNav').onclick=()=>document.getElementById('sIn').focus();
document.getElementById('aMus').onclick=()=>{if(!pl.length)doScan();else document.getElementById('plL').classList.toggle('hidden')};
document.getElementById('aFS').onclick=()=>{if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});else document.exitFullscreen()};
document.getElementById('aTm').onclick=()=>{dk=!dk;const r=document.documentElement.style;r.setProperty('--bg',dk?'#060a13':'#e2e8f0');r.setProperty('--card',dk?'rgba(10,18,32,.88)':'rgba(255,255,255,.9)');r.setProperty('--border',dk?'rgba(0,229,255,.1)':'rgba(0,0,0,.08)');r.setProperty('--text',dk?'#e2e8f0':'#1e293b');r.setProperty('--muted',dk?'#4a5e78':'#64748b');document.getElementById('tmI').className=dk?'fas fa-moon':'fas fa-sun';setTiles();toast(dk?'Tema oscuro':'Tema claro')};
document.getElementById('aBr').onclick=()=>{if(!window.DeviceOrientationEvent){toast('BrÃšjula no disponible');return}toast('BrÃšjula activada');window.addEventListener('deviceorientationabsolute',e=>{hdg=e.alpha},true)};

/* ============================================================
   INICIO
   ============================================================ */
async function init(){
    sizeS();animS();initMap();initGPS();
    /* Cargar mÃšsica guardada en IndexedDB */
    await loadCachedMusic();
    window.addEventListener('resize',()=>{sizeS();map.invalidateSize()});
}
init();
</script>
