<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DriveLaunch - Car Launcher</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #060a13;
            --card: rgba(10, 18, 32, 0.88);
            --border: rgba(0, 229, 255, 0.1);
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.25);
            --warm: #ff6b35;
            --text: #e2e8f0;
            --muted: #4a5e78;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        /* Fondo sutil con puntos */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: radial-gradient(rgba(0,229,255,0.025) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none; z-index: 0;
        }
        .font-orb { font-family: 'Orbitron', monospace; }

        /* === GRID PRINCIPAL === */
        .launcher {
            display: grid;
            height: 100vh; width: 100vw;
            gap: 5px; padding: 5px;
            position: relative; z-index: 1;
        }
        /* Landscape: 3 columnas, 3 filas */
        @media (orientation: landscape) {
            .launcher {
                grid-template-columns: 1.6fr 1.4fr 1.2fr;
                grid-template-rows: 1.15fr 1fr auto;
            }
            .zone-map   { grid-column: 1/3; grid-row: 1; }
            .zone-info  { grid-column: 3;   grid-row: 1; }
            .zone-music { grid-column: 1/3; grid-row: 2; }
            .zone-speed { grid-column: 3;   grid-row: 2; }
            .zone-bar   { grid-column: 1/4; grid-row: 3; }
        }
        /* Portrait: 1 columna */
        @media (orientation: portrait) {
            .launcher {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 0.9fr 0.85fr auto;
            }
            .zone-map   { grid-column: 1; grid-row: 1; }
            .zone-info  { display: none !important; }
            .zone-music { grid-column: 1; grid-row: 2; }
            .zone-speed { grid-column: 1; grid-row: 3; }
            .zone-bar   { grid-column: 1; grid-row: 4; }
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(16px);
        }

        /* === MAPA === */
        #map { width: 100%; height: 100%; z-index: 1; }
        .map-search {
            position: absolute; top: 8px; left: 8px; right: 54px; z-index: 1000;
            display: flex; gap: 6px;
        }
        .map-search input {
            flex: 1; background: rgba(6,10,19,0.93);
            border: 1px solid var(--border); color: var(--text);
            padding: 10px 14px; border-radius: 10px;
            font-family: 'Rajdhani', sans-serif; font-size: 15px; outline: none;
        }
        .map-search input:focus { border-color: var(--accent); box-shadow: 0 0 16px var(--accent-glow); }
        .map-search input::placeholder { color: var(--muted); }
        .map-search button {
            background: var(--accent); color: #000; border: none;
            padding: 0 16px; border-radius: 10px; font-size: 16px; cursor: pointer;
        }
        .map-search button:active { transform: scale(0.93); }
        .map-locate {
            position: absolute; top: 8px; right: 8px; z-index: 1000;
            width: 38px; height: 38px; border-radius: 10px;
            background: rgba(6,10,19,0.93); border: 1px solid var(--border);
            color: var(--accent); cursor: pointer; font-size: 15px;
            display: flex; align-items: center; justify-content: center;
        }
        .map-locate:active { background: var(--accent); color: #000; }
        .route-badge {
            position: absolute; bottom: 10px; left: 10px; right: 54px; z-index: 1000;
            background: rgba(6,10,19,0.93); border: 1px solid var(--border);
            border-radius: 10px; padding: 8px 14px;
            display: none; align-items: center; gap: 10px; font-weight: 600; font-size: 14px;
        }
        .route-badge.on { display: flex; }
        .route-badge button {
            margin-left: auto; background: none; border: none;
            color: var(--danger); cursor: pointer; font-size: 16px;
        }
        /* Info overlay en portrait */
        .portrait-info {
            display: none; position: absolute; bottom: 10px; right: 10px; z-index: 1000;
            background: rgba(6,10,19,0.88); border: 1px solid var(--border);
            border-radius: 8px; padding: 5px 12px; text-align: right;
        }
        @media (orientation: portrait) { .portrait-info { display: block; } }

        /* === INFO === */
        .zone-info {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 4px; padding: 10px;
        }

        /* === VELOCÍMETRO === */
        .zone-speed { display: flex; align-items: center; justify-content: center; }
        #speedCanvas { max-width: 100%; max-height: 100%; }

        /* === MÚSICA === */
        .zone-music { display: flex; flex-direction: column; padding: 10px 16px; }
        .m-btn {
            background: none; border: 1px solid var(--border);
            color: var(--text); width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 15px; transition: all .2s; flex-shrink: 0;
        }
        .m-btn:active, .m-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        .m-btn.main { width: 52px; height: 52px; font-size: 20px; border-color: var(--accent); color: var(--accent); }
        .prog-bar { width: 100%; height: 5px; background: rgba(255,255,255,0.07); border-radius: 3px; cursor: pointer; position: relative; }
        .prog-fill { height: 100%; background: var(--accent); border-radius: 3px; width: 0%; pointer-events: none; transition: width .3s linear; }
        .pl-list { max-height: 60px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--accent) transparent; }
        .pl-list::-webkit-scrollbar { width: 3px; }
        .pl-list::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
        .pl-item {
            padding: 3px 8px; font-size: 13px; cursor: pointer; border-radius: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: var(--muted); transition: all .15s;
        }
        .pl-item.on { color: var(--accent); background: var(--accent-glow); }
        .scan-b {
            background: linear-gradient(135deg, var(--accent), #0091a7);
            color: #000; border: none; padding: 12px 28px; border-radius: 10px;
            font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 16px;
            cursor: pointer; transition: all .2s;
        }
        .scan-b:active { transform: scale(0.95); }
        .vol-sl {
            -webkit-appearance: none; appearance: none;
            width: 70px; height: 4px; background: rgba(255,255,255,0.08);
            border-radius: 2px; outline: none;
        }
        .vol-sl::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 14px; height: 14px; border-radius: 50%;
            background: var(--accent); cursor: pointer;
        }

        /* === BARRA DE ACCIONES === */
        .zone-bar { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 4px 8px; }
        .a-btn {
            background: var(--card); border: 1px solid var(--border);
            color: var(--muted); width: 60px; height: 50px; border-radius: 12px;
            cursor: pointer; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 2px;
            font-size: 18px; transition: all .2s; flex-shrink: 0;
        }
        .a-btn span { font-size: 9px; font-family: 'Rajdhani', sans-serif; font-weight: 600; }
        .a-btn:active { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 14px var(--accent-glow); transform: scale(0.92); }

        /* Toast */
        .toast {
            position: fixed; bottom: 66px; left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: #0c1423; border: 1px solid var(--border);
            color: var(--text); padding: 10px 24px; border-radius: 10px;
            font-size: 14px; font-weight: 500; opacity: 0;
            transition: all .3s; z-index: 9999; pointer-events: none; white-space: nowrap;
        }
        .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

        .leaflet-control-zoom, .leaflet-control-attribution { display: none !important; }

        @keyframes gpsPulse {
            0% { box-shadow: 0 0 0 0 rgba(0,229,255,0.5); }
            70% { box-shadow: 0 0 0 8px rgba(0,229,255,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,229,255,0); }
        }
        .gps-on { animation: gpsPulse 2s ease-out infinite; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>

<div class="launcher">
    <!-- MAPA / NAVEGACIÓN -->
    <section class="zone-map card" aria-label="Navegación GPS">
        <div class="map-search">
            <input type="text" id="searchIn" placeholder="Buscar destino..." aria-label="Buscar destino">
            <button id="searchBtn" aria-label="Buscar"><i class="fas fa-search"></i></button>
        </div>
        <button class="map-locate" id="locBtn" aria-label="Mi ubicación"><i class="fas fa-crosshairs"></i></button>
        <div id="map"></div>
        <div class="route-badge" id="routeBadge">
            <i class="fas fa-route" style="color:var(--accent)"></i>
            <span id="rDist">--</span>
            <span style="color:var(--muted)">|</span>
            <span id="rTime">--</span>
            <button id="cancelR" aria-label="Cancelar ruta"><i class="fas fa-xmark"></i></button>
        </div>
        <div class="portrait-info">
            <div class="font-orb text-lg font-bold" id="pClock" style="color:var(--accent)">00:00</div>
            <div class="text-xs font-semibold" id="pTemp" style="color:var(--muted)">--°C</div>
        </div>
    </section>

    <!-- INFO: RELOJ + TEMPERATURA + GPS -->
    <section class="zone-info card" aria-label="Información">
        <div class="font-orb text-4xl font-bold" id="clock" style="color:var(--accent);letter-spacing:2px">00:00</div>
        <div class="text-sm font-semibold" id="dateStr" style="color:var(--muted)">--</div>
        <div style="height:8px"></div>
        <div class="flex items-center gap-2">
            <i class="fas fa-temperature-half" style="color:var(--warm)"></i>
            <span class="text-xl font-bold" id="temp">--°C</span>
        </div>
        <div style="height:6px"></div>
        <div class="flex items-center gap-2">
            <div id="gpsDot" style="width:8px;height:8px;border-radius:50%;background:var(--muted)"></div>
            <span class="text-xs font-semibold" style="color:var(--muted)" id="gpsLbl">Sin GPS</span>
        </div>
    </section>

    <!-- MÚSICA -->
    <section class="zone-music card" aria-label="Reproductor de música">
        <!-- Vista escaneo -->
        <div id="scanV" class="flex flex-col items-center justify-center h-full gap-4">
            <i class="fas fa-music text-4xl" style="color:var(--accent);opacity:.6"></i>
            <p class="text-sm" style="color:var(--muted)">Selecciona tus archivos de música</p>
            <button class="scan-b" id="scanB"><i class="fas fa-folder-open"></i>&nbsp; Escanear Música</button>
        </div>
        <!-- Vista reproductor -->
        <div id="playV" class="hidden flex flex-col h-full">
            <div class="flex items-center gap-2 mb-1">
                <i class="fas fa-music text-xs" style="color:var(--accent)"></i>
                <span class="text-sm font-semibold truncate" id="tName" style="color:var(--muted)">--</span>
            </div>
            <div class="prog-bar" id="progBar"><div class="prog-fill" id="progFill"></div></div>
            <div class="flex justify-between text-xs mt-1" style="color:var(--muted)">
                <span id="curT">0:00</span><span id="totT">0:00</span>
            </div>
            <div class="flex items-center justify-center gap-4 mt-auto mb-1">
                <button class="m-btn" id="shufBtn" aria-label="Aleatorio"><i class="fas fa-shuffle"></i></button>
                <button class="m-btn" id="prevBtn" aria-label="Anterior"><i class="fas fa-backward-step"></i></button>
                <button class="m-btn main" id="playBtn" aria-label="Reproducir"><i class="fas fa-play" id="playIco"></i></button>
                <button class="m-btn" id="nextBtn" aria-label="Siguiente"><i class="fas fa-forward-step"></i></button>
                <button class="m-btn" id="repBtn" aria-label="Repetir"><i class="fas fa-repeat"></i></button>
            </div>
            <div class="flex items-center gap-2 justify-center">
                <i class="fas fa-volume-low text-xs" style="color:var(--muted)"></i>
                <input type="range" class="vol-sl" id="volSl" min="0" max="100" value="80" aria-label="Volumen">
                <i class="fas fa-volume-high text-xs" style="color:var(--muted)"></i>
            </div>
            <div class="flex items-center justify-between mt-1">
                <button id="togPL" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;font-family:'Rajdhani',sans-serif;font-weight:600">
                    <i class="fas fa-list"></i> Playlist (<span id="tCount">0</span>)
                </button>
                <button id="addMore" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;font-family:'Rajdhani',sans-serif;font-weight:600">
                    <i class="fas fa-plus"></i> Agregar
                </button>
            </div>
            <div class="pl-list hidden" id="plList"></div>
        </div>
    </section>

    <!-- VELOCÍMETRO -->
    <section class="zone-speed card" aria-label="Velocímetro">
        <canvas id="speedCanvas" aria-live="polite"></canvas>
    </section>

    <!-- BARRA DE ACCIONES -->
    <nav class="zone-bar" aria-label="Acciones rápidas">
        <button class="a-btn" id="actNav"><i class="fas fa-location-arrow"></i><span>Navegar</span></button>
        <button class="a-btn" id="actMus"><i class="fas fa-headphones"></i><span>Música</span></button>
        <button class="a-btn" id="actFS"><i class="fas fa-expand"></i><span>Fullscreen</span></button>
        <button class="a-btn" id="actTm"><i class="fas fa-moon" id="tmIco"></i><span>Tema</span></button>
        <button class="a-btn" id="actBr"><i class="fas fa-compass"></i><span>Brújula</span></button>
    </nav>
</div>

<input type="file" id="fileIn" accept="audio/*" multiple style="display:none">
<div class="toast" id="toast"></div>

<script>
/* ==========================================
   ESTADO GLOBAL
   ========================================== */
let map, tileL, uMarker, accCirc, routeL, destMk;
let uLat = 19.4326, uLon = -99.1332;
let gpsSpd = 0, dispSpd = 0;
const MAX_SPD = 260;
let hasGps = false, following = true;
let pl = [], curTrk = -1, playing = false;
let shufOn = false, repMode = 0; // 0=off,1=all,2=one
const aud = new Audio();
aud.volume = 0.8;
let dark = true, heading = null, lastTempT = 0;

/* ==========================================
   UTILIDADES
   ========================================== */
function toast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.classList.add('on');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('on'), 2800);
}
function fmtT(s) {
    if (!s || isNaN(s)) return '0:00';
    return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}
function fmtD(m) { return m < 1000 ? Math.round(m) + ' m' : (m / 1000).toFixed(1) + ' km'; }
function fmtDr(s) {
    if (s < 60) return Math.round(s) + ' seg';
    if (s < 3600) return Math.round(s / 60) + ' min';
    return Math.floor(s / 3600) + 'h ' + Math.round((s % 3600) / 60) + 'min';
}

/* ==========================================
   RELOJ
   ========================================== */
function tickClock() {
    const n = new Date();
    const t = n.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', hour12: false });
    const d = n.toLocaleDateString('es-MX', { weekday: 'short', day: 'numeric', month: 'short' });
    document.getElementById('clock').textContent = t;
    document.getElementById('pClock').textContent = t;
    document.getElementById('dateStr').textContent = d;
}
setInterval(tickClock, 1000);
tickClock();

/* ==========================================
   VELOCÍMETRO (Canvas)
   ========================================== */
const sC = document.getElementById('speedCanvas');
const sX = sC.getContext('2d');

function sizeSpeedo() {
    const sec = document.querySelector('.zone-speed');
    const s = Math.max(Math.min(sec.clientWidth, sec.clientHeight) - 10, 100);
    const dp = window.devicePixelRatio || 1;
    sC.width = s * dp; sC.height = s * dp;
    sC.style.width = s + 'px'; sC.style.height = s + 'px';
    sX.setTransform(dp, 0, 0, dp, 0, 0);
}

function drawSpeedo() {
    const w = parseInt(sC.style.width);
    const cx = w / 2, cy = w / 2;
    const R = Math.max(w / 2 - 14, 36);
    const SA = 0.75 * Math.PI, EA = 2.25 * Math.PI, SW = EA - SA;

    sX.clearRect(0, 0, w, w);

    /* Fondo sutil */
    const bg = sX.createRadialGradient(cx, cy, 0, cx, cy, R);
    bg.addColorStop(0, 'rgba(0,229,255,0.035)');
    bg.addColorStop(1, 'rgba(0,229,255,0)');
    sX.fillStyle = bg;
    sX.beginPath(); sX.arc(cx, cy, R, 0, Math.PI * 2); sX.fill();

    /* Arco fondo */
    sX.beginPath(); sX.arc(cx, cy, R, SA, EA, false);
    sX.strokeStyle = 'rgba(255,255,255,0.06)';
    sX.lineWidth = Math.max(w * 0.03, 5); sX.lineCap = 'round'; sX.stroke();

    /* Arco activo */
    const f = Math.min(Math.max(dispSpd, 0) / MAX_SPD, 1);
    if (f > 0.003) {
        sX.save();
        sX.shadowColor = '#00e5ff'; sX.shadowBlur = 18;
        sX.beginPath(); sX.arc(cx, cy, R, SA, SA + f * SW, false);
        sX.strokeStyle = '#00e5ff';
        sX.lineWidth = Math.max(w * 0.03, 5); sX.lineCap = 'round'; sX.stroke();
        sX.restore();
    }

    /* Marcas y números (0, 20, 40, 60, 80, 100, 120, 140, 160, 180, 200, 220, 240, 260) */
    for (let v = 0; v <= MAX_SPD; v += 10) {
        const a = SA + (v / MAX_SPD) * SW;
        const big = v % 40 === 0;
        const iR = R - (big ? w * 0.1 : w * 0.06);
        const oR = R - w * 0.025;
        sX.beginPath();
        sX.moveTo(cx + iR * Math.cos(a), cy + iR * Math.sin(a));
        sX.lineTo(cx + oR * Math.cos(a), cy + oR * Math.sin(a));
        sX.strokeStyle = big ? '#a0b0c8' : 'rgba(255,255,255,0.15)';
        sX.lineWidth = big ? 2.5 : 1; sX.lineCap = 'round'; sX.stroke();

        if (big) {
            const nR = R - w * 0.16;
            sX.fillStyle = '#5a7090';
            sX.font = `500 ${Math.max(w * 0.044, 8)}px Orbitron`;
            sX.textAlign = 'center'; sX.textBaseline = 'middle';
            sX.fillText(v.toString(), cx + nR * Math.cos(a), cy + nR * Math.sin(a));
        }
    }

    /* Aguja */
    const nA = SA + f * SW;
    const nL = R - w * 0.17;
    sX.save(); sX.translate(cx, cy); sX.rotate(nA);
    sX.shadowColor = '#00e5ff'; sX.shadowBlur = 16;
    sX.beginPath(); sX.moveTo(0, -2.5); sX.lineTo(nL, 0); sX.lineTo(0, 2.5); sX.closePath();
    sX.fillStyle = '#00e5ff'; sX.fill();
    sX.restore();

    /* Centro */
    sX.beginPath(); sX.arc(cx, cy, Math.max(w * 0.03, 4), 0, Math.PI * 2);
    sX.fillStyle = '#0a1220'; sX.fill();
    sX.strokeStyle = '#00e5ff'; sX.lineWidth = 2; sX.stroke();

    /* Número grande central */
    sX.fillStyle = '#00e5ff';
    sX.font = `900 ${Math.max(w * 0.22, 20)}px Orbitron`;
    sX.textAlign = 'center'; sX.textBaseline = 'middle';
    sX.fillText(Math.round(dispSpd).toString(), cx, cy + w * 0.14);

    /* km/h */
    sX.fillStyle = '#3a5068';
    sX.font = `600 ${Math.max(w * 0.055, 9)}px Rajdhani`;
    sX.fillText('km/h', cx, cy + w * 0.26);

    /* Sin GPS */
    if (!hasGps) {
        sX.fillStyle = 'rgba(239,68,68,0.65)';
        sX.font = `600 ${Math.max(w * 0.04, 8)}px Rajdhani`;
        sX.fillText('Sin GPS', cx, cy - w * 0.08);
    }
}

function animSpeedo() {
    dispSpd += (gpsSpd - dispSpd) * 0.07;
    if (Math.abs(dispSpd - gpsSpd) < 0.12) dispSpd = gpsSpd;
    drawSpeedo();
    requestAnimationFrame(animSpeedo);
}

/* ==========================================
   GPS
   ========================================== */
function initGPS() {
    if (!navigator.geolocation) { toast('GPS no disponible'); return; }
    navigator.geolocation.watchPosition(p => {
        hasGps = true;
        uLat = p.coords.latitude; uLon = p.coords.longitude;
        if (p.coords.speed !== null && p.coords.speed >= 0) gpsSpd = p.coords.speed * 3.6;
        if (uMarker) {
            uMarker.setLatLng([uLat, uLon]);
            accCirc.setLatLng([uLat, uLon]);
            accCirc.setRadius(p.coords.accuracy || 50);
            if (following) map.panTo([uLat, uLon], { animate: true, duration: 0.5 });
        }
        document.getElementById('gpsDot').style.background = '#00e5ff';
        document.getElementById('gpsDot').classList.add('gps-on');
        document.getElementById('gpsLbl').textContent = 'GPS Activo';
        fetchTemp(uLat, uLon);
    }, e => { console.warn('GPS:', e.message); }, { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 });
}

/* ==========================================
   TEMPERATURA (Open-Meteo)
   ========================================== */
async function fetchTemp(lat, lon) {
    const now = Date.now();
    if (now - lastTempT < 300000) return; // cada 5 min
    lastTempT = now;
    try {
        const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
        const d = await r.json();
        const t = d.current_weather?.temperature;
        if (t !== undefined) {
            document.getElementById('temp').textContent = Math.round(t) + '°C';
            document.getElementById('pTemp').textContent = Math.round(t) + '°C';
        }
    } catch (e) { console.warn('Temp error:', e); }
}

/* ==========================================
   MAPA
   ========================================== */
function setTiles() {
    if (tileL) map.removeLayer(tileL);
    tileL = L.tileLayer(
        dark ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
             : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
        { maxZoom: 19 }
    ).addTo(map);
}

function initMap() {
    map = L.map('map', { center: [uLat, uLon], zoom: 14, zoomControl: false, attributionControl: false });
    setTiles();

    const uIco = L.divIcon({
        html: '<div style="width:16px;height:16px;background:#00e5ff;border-radius:50%;border:3px solid rgba(0,229,255,.25);box-shadow:0 0 14px rgba(0,229,255,.5)"></div>',
        iconSize: [16, 16], iconAnchor: [8, 8], className: ''
    });
    uMarker = L.marker([uLat, uLon], { icon: uIco }).addTo(map);
    accCirc = L.circle([uLat, uLon], {
        radius: 50, fillColor: '#00e5ff', fillOpacity: 0.05,
        color: '#00e5ff', weight: 1, opacity: 0.15
    }).addTo(map);

    map.on('dragstart', () => { following = false; });
    document.getElementById('locBtn').onclick = () => { following = true; map.flyTo([uLat, uLon], 15, { duration: 0.8 }); };
    document.getElementById('searchBtn').onclick = searchDest;
    document.getElementById('searchIn').onkeydown = e => { if (e.key === 'Enter') searchDest(); };
    document.getElementById('cancelR').onclick = clearRoute;

    setTimeout(() => map.invalidateSize(), 300);
}

/* Buscar destino con Nominatim */
async function searchDest() {
    const q = document.getElementById('searchIn').value.trim();
    if (!q) return;
    const btn = document.getElementById('searchBtn');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    try {
        const r = await fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(q) + '&limit=1');
        const d = await r.json();
        if (!d.length) { toast('No se encontró el destino'); btn.innerHTML = '<i class="fas fa-search"></i>'; return; }
        const dLa = +d[0].lat, dLo = +d[0].lon;
        if (destMk) map.removeLayer(destMk);
        destMk = L.marker([dLa, dLo], {
            icon: L.divIcon({
                html: '<div style="width:20px;height:20px;background:#ff6b35;border-radius:50%;border:3px solid rgba(255,107,53,.3);box-shadow:0 0 14px rgba(255,107,53,.5)"></div>',
                iconSize: [20, 20], iconAnchor: [10, 10], className: ''
            })
        }).addTo(map);
        await traceRoute(uLat, uLon, dLa, dLo);
        if (routeL) map.fitBounds(routeL.getBounds(), { padding: [50, 50] });
    } catch (e) { toast('Error al buscar'); console.error(e); }
    btn.innerHTML = '<i class="fas fa-search"></i>';
}

/* Trazar ruta con OSRM */
async function traceRoute(fLa, fLo, tLa, tLo) {
    clearRoute();
    try {
        const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${fLo},${fLa};${tLo},${tLa}?overview=full&geometries=geojson`);
        const d = await r.json();
        if (d.code !== 'Ok' || !d.routes.length) { toast('No se pudo trazar la ruta'); return; }
        const rt = d.routes[0];
        const coords = rt.geometry.coordinates.map(c => [c[1], c[0]]);
        /* Sombra de ruta */
        routeL = L.polyline(coords, { color: 'rgba(0,229,255,0.15)', weight: 10, lineCap: 'round', lineJoin: 'round' }).addTo(map);
        L.polyline(coords, { color: '#00e5ff', weight: 4, lineCap: 'round', lineJoin: 'round' }).addTo(map);
        document.getElementById('rDist').textContent = fmtD(rt.distance);
        document.getElementById('rTime').textContent = fmtDr(rt.duration);
        document.getElementById('routeBadge').classList.add('on');
        toast('Ruta calculada');
    } catch (e) { toast('Error al trazar ruta'); console.error(e); }
}

function clearRoute() {
    if (routeL) { map.removeLayer(routeL); routeL = null; }
    map.eachLayer(l => { if (l instanceof L.Polyline && l !== accCirc) map.removeLayer(l); });
    if (destMk) { map.removeLayer(destMk); destMk = null; }
    document.getElementById('routeBadge').classList.remove('on');
}

/* ==========================================
   MÚSICA
   ========================================== */
const fileIn = document.getElementById('fileIn');

document.getElementById('scanB').onclick = () => fileIn.click();
document.getElementById('addMore').onclick = () => fileIn.click();

fileIn.onchange = e => {
    const files = Array.from(e.target.files).filter(f => f.type.startsWith('audio/'));
    if (!files.length) { toast('No se encontraron archivos de audio'); return; }
    files.forEach(f => {
        const url = URL.createObjectURL(f);
        const name = f.name.replace(/\.[^/.]+$/, '');
        pl.push({ name, url, file: f });
    });
    document.getElementById('tCount').textContent = pl.length;
    buildPL();
    document.getElementById('scanV').classList.add('hidden');
    document.getElementById('playV').classList.remove('hidden');
    toast(pl.length + ' canciones cargadas');
    if (curTrk === -1) loadTrack(0);
    fileIn.value = '';
};

function buildPL() {
    const box = document.getElementById('plList');
    box.innerHTML = '';
    pl.forEach((t, i) => {
        const d = document.createElement('div');
        d.className = 'pl-item' + (i === curTrk ? ' on' : '');
        d.textContent = (i + 1) + '. ' + t.name;
        d.onclick = () => { loadTrack(i); playAud(); };
        box.appendChild(d);
    });
}

function loadTrack(i) {
    if (i < 0 || i >= pl.length) return;
    curTrk = i;
    aud.src = pl[i].url;
    document.getElementById('tName').textContent = pl[i].name;
    document.getElementById('tName').style.color = 'var(--text)';
    buildPL();
}

function playAud() {
    aud.play().then(() => {
        playing = true;
        document.getElementById('playIco').className = 'fas fa-pause';
    }).catch(e => { toast('Error al reproducir'); console.error(e); });
}
function pauseAud() {
    aud.pause(); playing = false;
    document.getElementById('playIco').className = 'fas fa-play';
}

document.getElementById('playBtn').onclick = () => {
    if (curTrk === -1) return;
    playing ? pauseAud() : playAud();
};
document.getElementById('prevBtn').onclick = () => {
    if (pl.length === 0) return;
    if (aud.currentTime > 3) { aud.currentTime = 0; return; }
    let i = curTrk - 1; if (i < 0) i = pl.length - 1;
    loadTrack(i); playAud();
};
document.getElementById('nextBtn').onclick = nextTrack;
function nextTrack() {
    if (pl.length === 0) return;
    let i;
    if (shufOn) { i = Math.floor(Math.random() * pl.length); }
    else { i = curTrk + 1; if (i >= pl.length) i = 0; }
    loadTrack(i); playAud();
}
aud.onended = () => {
    if (repMode === 2) { aud.currentTime = 0; playAud(); }
    else if (repMode === 1 || curTrk < pl.length - 1) nextTrack();
    else pauseAud();
};
document.getElementById('shufBtn').onclick = () => {
    shufOn = !shufOn;
    document.getElementById('shufBtn').style.color = shufOn ? 'var(--accent)' : 'var(--text)';
    document.getElementById('shufBtn').style.borderColor = shufOn ? 'var(--accent)' : 'var(--border)';
    toast(shufOn ? 'Aleatorio activado' : 'Aleatorio desactivado');
};
document.getElementById('repBtn').onclick = () => {
    repMode = (repMode + 1) % 3;
    const btn = document.getElementById('repBtn');
    if (repMode === 0) { btn.style.color = 'var(--text)'; btn.style.borderColor = 'var(--border)'; toast('Repetir desactivado'); }
    else if (repMode === 1) { btn.style.color = 'var(--accent)'; btn.style.borderColor = 'var(--accent)'; toast('Repetir todo'); }
    else { btn.style.color = 'var(--warm)'; btn.style.borderColor = 'var(--warm)'; toast('Repetir una'); }
};
document.getElementById('volSl').oninput = e => { aud.volume = e.target.value / 100; };
aud.ontimeupdate = () => {
    if (!aud.duration) return;
    document.getElementById('progFill').style.width = (aud.currentTime / aud.duration * 100) + '%';
    document.getElementById('curT').textContent = fmtT(aud.currentTime);
    document.getElementById('totT').textContent = fmtT(aud.duration);
};
document.getElementById('progBar').onclick = e => {
    if (!aud.duration) return;
    const r = e.target.getBoundingClientRect();
    aud.currentTime = ((e.clientX - r.left) / r.width) * aud.duration;
};
document.getElementById('togPL').onclick = () => {
    document.getElementById('plList').classList.toggle('hidden');
};

/* ==========================================
   BARRA DE ACCIONES
   ========================================== */
document.getElementById('actNav').onclick = () => {
    document.getElementById('searchIn').focus();
    document.querySelector('.zone-map').scrollIntoView({ behavior: 'smooth' });
};
document.getElementById('actMus').onclick = () => {
    if (pl.length === 0) fileIn.click();
    else document.getElementById('plList').classList.toggle('hidden');
};
document.getElementById('actFS').onclick = () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    else document.exitFullscreen();
};
document.getElementById('actTm').onclick = () => {
    dark = !dark;
    document.documentElement.style.setProperty('--bg', dark ? '#060a13' : '#e2e8f0');
    document.documentElement.style.setProperty('--card', dark ? 'rgba(10,18,32,0.88)' : 'rgba(255,255,255,0.9)');
    document.documentElement.style.setProperty('--border', dark ? 'rgba(0,229,255,0.1)' : 'rgba(0,0,0,0.08)');
    document.documentElement.style.setProperty('--text', dark ? '#e2e8f0' : '#1e293b');
    document.documentElement.style.setProperty('--muted', dark ? '#4a5e78' : '#64748b');
    document.getElementById('tmIco').className = dark ? 'fas fa-moon' : 'fas fa-sun';
    setTiles();
    toast(dark ? 'Tema oscuro' : 'Tema claro');
};
document.getElementById('actBr').onclick = async () => {
    if (!window.DeviceOrientationEvent) { toast('Brújula no disponible'); return; }
    try {
        const perm = await navigator.permissions.query({ name: 'magnetometer' });
        if (perm.state === 'denied') { toast('Permiso de brújula denegado'); return; }
    } catch (e) {}
    if (heading !== null) {
        heading = null; toast('Brújula desactivada'); return;
    }
    window.addEventListener('deviceorientationabsolute', onOrient, true);
    window.addEventListener('deviceorientation', onOrientFallback);
    toast('Brújula activada - gira el dispositivo');
};
function onOrient(e) { heading = e.alpha; }
function onOrientFallback(e) {
    if (e.webkitCompassHeading !== undefined) heading = e.webkitCompassHeading;
    else if (e.alpha !== null) heading = e.alpha;
}

/* ==========================================
   INICIO
   ========================================== */
function init() {
    sizeSpeedo();
    animSpeedo();
    initMap();
    initGPS();
    window.addEventListener('resize', () => { sizeSpeedo(); map.invalidateSize(); });
}
init();
</script>
